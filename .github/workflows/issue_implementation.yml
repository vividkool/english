name: AI Implementation & Deploy (Issue Tracker)

on:
  issues:
    types: [opened, edited]
  push:
    branches:
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Python
        if: github.event_name == 'issues'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run AI Implementation Script
        if: github.event_name == 'issues'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: python scripts/automated_issue_handler.py

      - name: Commit and Push changes
        if: github.event_name == 'issues'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "docs: auto-update todo.md from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push origin develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Deploy to Firebase (Develop Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_deploy
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: develop
          projectId: english-c8526

      - name: Post comment to Issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.firebase_deploy.outputs.details_url }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🚀 **AIによる自動実装とDevelop環境へのデプロイが完了しました！**
          
          - 変更内容: todo.md を更新しました。
          - プレビューURL: $PREVIEW_URL
          
          動作確認後、問題なければ PR を作成し main へマージしてください。"
